<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>User registration form</title>
</head>
<body>

    <form method="POST" action="/submit">
        <table border="1" cellspacing="0" cellpadding="5">
            <caption><strong>User registration form</strong></caption>
            
            <tr>
                <td>Full Name</td>
                <td><input type="text" name="fullname" style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Adress</td>
                <td><textarea name="address" rows="5" style="width: 100%;"></textarea></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" name="email" style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Password</td>
                <td><input type="password" name="password" style="width: 100%;"></td>
            </tr>

            <tr>
                <td>Date of birth</td>
                <td><input type="date" name="birthdate"></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </td>
            </tr>

            <tr>
                <td>Please choose topics of interest</td>
                <td>
                    <input type="checkbox" id="fiction" name="interests[]" value="fiction">
                    <label for="fiction">Fiction</label><br>
                    <input type="checkbox" id="action" name="interests[]" value="action">
                    <label for="action">Action</label><br>
                    <input type="checkbox" id="thriller" name="interests[]" value="thriller">
                    <label for="thriller">Thriller</label><br>
                    <input type="checkbox" id="horror" name="interests[]" value="horror">
                    <label for="horror">Horror</label><br>
                    <input type="checkbox" id="comedy" name="interests[]" value="comedy">
                    <label for="comedy">Comedy</label>
                </td>
            </tr>

            <tr>
                <td>Select hobbies</td>
                <td>
                    <select name="hobbies[]" multiple size="4">
                        <option value="outdoor">Outdoor Sports</option>
                        <option value="adventure">Adventure Sports</option>
                        <option value="pop">Pop Music</option>
                        <option value="rock">Rock Music</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="submit" value="submit">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
