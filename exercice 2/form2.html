<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    
</head>
<body>
        <h2>Avec liste deroulante :</h2>
        <form id="calcForm">
                <label for="operand1">Premier opérande :</label>
                <input type="number" id="operand1" name="operand1" required>

                <label>Opération :</label>
               <select name="list op" id="1">
                    <option value="+">(+)</option>
                    <option value="-">(-)</option>
                    <option value="*">(*)</option>
                    <option value="/">(/)</option>
                </select>
               </select>

                <label for="operand2">Deuxième opérande :</label>
                <input type="number" id="operand2" name="operand2" required>

            <button type="submit">Calculer</button>
            <hr>
            <h2>Avec bouton radios :</h2>
            <label for="operand1">Premier opérande :</label>
                <input type="number" id="operand1" name="operand1" required>

                <label>Opération :</label>
               
                    <input type="radio" value="+" name="radio">(+)</option>
                    <input type="radio" value="-" name="radio">(-)</option>
                    <input type="radio" value="*" name="radio">(*)</option>
                    <input type="radio" value="/" name="radio">(/)</option>
                </select>
               </select>

                <label for="operand2">Deuxième opérande :</label>
                <input type="number" id="operand2" name="operand2" required>

            <button type="submit">Calculer</button>

        </form>

        <div id="result"></div>
</body>
</html>
